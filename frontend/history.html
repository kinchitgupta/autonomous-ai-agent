<!DOCTYPE html>
<html>
<head>
    <title>Agent History</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
        }

        header {
            background: #020617;
            padding: 18px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #1f2937;
        }

        .controls {
            text-align: center;
            padding: 15px;
        }

        button {
            padding: 10px 16px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .clearBtn {
            background: #ef4444;
            color: white;
        }

        .reloadBtn {
            background: #22c55e;
            color: white;
        }

        .card {
            background: #111827;
            margin: 15px auto;
            padding: 16px;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            border: 1px solid #1f2937;
        }

        .task {
            color: #60a5fa;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .result {
            background: #020617;
            padding: 10px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .time {
            margin-top: 8px;
            font-size: 12px;
            opacity: 0.6;
        }

        .empty {
            text-align: center;
            margin-top: 40px;
            opacity: 0.6;
        }

        .nav {
            text-align: center;
            padding: 20px;
        }

        a {
            color: #22c55e;
            text-decoration: none;
        }
    </style>
</head>

<body>

<header>Agent Run History</header>

<div class="controls">
    <button class="reloadBtn" onclick="loadHistory()">Reload</button>
    <button class="clearBtn" onclick="clearHistory()">Clear All</button>
</div>

<div id="history"></div>

<div class="nav">
    <a href="/">⬅ Back to Agent</a>
</div>

<script>
function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleString();
}

async function loadHistory() {
    const res = await fetch("http://127.0.0.1:8000/agent-runs");
    const data = await res.json();

    const box = document.getElementById("history");
    box.innerHTML = "";

    if (!data.length) {
        box.innerHTML = '<div class="empty">No runs yet.</div>';
        return;
    }

    data.reverse().forEach(item => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="task">Task: ${item.task}</div>
            <div class="result">${item.result}</div>
            <div class="time">${formatTime(item.created_at)}</div>
        `;

        box.appendChild(div);
    });
}

async function clearHistory() {
    if (!confirm("Delete all history?")) return;
    await fetch("http://127.0.0.1:8000/clear-history", {
        method: "DELETE"
    });
    loadHistory();
}

loadHistory();
</script>

</body>
</html>
