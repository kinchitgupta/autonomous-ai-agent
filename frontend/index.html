<!DOCTYPE html>
<html lang="">
<head>
    <title>Autonomous AI Agent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Consolas;
            background: black;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #020617;
            padding: 16px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #1f2937;
        }

        #chat {
            flex: 1;
            overflow-y:auto ;
            padding: 20px;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .user {
            background: rgb(53, 68, 71);
            margin-left: auto;
        }

        .agent {
            background: #1f2937;
            margin-right: auto;
        }

        .inputBar {
            display: flex;
            gap: 10px;
            padding: 15px;
            border-top: 1px solid #1f2937;
            background: #020617;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        button {
            padding: 12px 18px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            background: #22c55e;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }

        .typing {
            opacity: 0.7;
            font-style: italic;
        }

        .nav {
            text-align: center;
            padding: 8px;
            background: #020617;
            border-top: 1px solid #1f2937;
        }

        a {
            color: #22c55e;
            text-decoration: none;
        }
    </style>
</head>

<body>

<header>Autonomous AI Agent</header>

<div id="chat"></div>

<div class="inputBar">
    <label for="task"></label><input id="task" placeholder="Ask agent any questions and calculations ..." />
    <button onclick="runAgent()">Send</button>
</div>

<div class="nav">
    <a href="/history">View History</a>
</div>

<script>
function addBubble(text, cls) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "bubble " + cls;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function runAgent() {
    const input = document.getElementById("task");
    const task = input.value.trim();
    if (!task) return;

    input.value = "";

    addBubble(task, "user");
    const typingBubble = addBubble("Agent thinking...", "agent typing");

    try {
        const res = await fetch("http://127.0.0.1:8000/run-agent", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({task})
        });

        if (!res.ok) throw new Error(res.status);

        const data = await res.json();
        typingBubble.remove();
        addBubble(data.result || "No result", "agent");

    } catch (e) {
        typingBubble.innerText = "Invalid Input Agent Only perform specific tasks!!";
        console.error(e);
    }
}

document.getElementById("task")
    .addEventListener("keydown", e => {
        if (e.key === "Enter") runAgent();
    });
</script>

</body>
</html>
